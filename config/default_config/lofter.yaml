
# 自动解析 Lofter 链接
autoParse: true

# 是否发送原图（可能会增加流量消耗）
sendOriginal: false

# 消息发送方式
# forward: 合并转发（默认选项，可将多条消息打包成一条发送）
# normal: 逐条发送（将解析出的图片和文本逐条发送至聊天内容）
sendMode: forward

# 无图博文纯文本的发送模式
# single: 单消息发送（每个自然段间空一行，提升可读性）
# multi: 多消息发送（每遇到一个换行分割为一条新消息，仅在合并转发模式下有效）
# image: 图片模式（将全文渲染为长图发送）
pureTextSendMode: single

# === 图片模式专属配置 ===
# 图片模式背景色
imageBgColor: '#FFFFFF'
# 图片模式正文字体颜色
imageFontColor: '#333333'
# 图片模式正文基础字号(px)
imageFontSize: 16
# 图片模式正文行高
imageLineHeight: 1.8
# 图片模式标题颜色
imageTitleColor: '#000000'
# 图片模式标题字号(px)
imageTitleSize: 22
# 图片模式整体内边距(px)
imagePadding: 40

# 在解析到有图片时，单独发送第一张图片到聊天（常用于开启合并转发时进行前置预览）
sendFirstImage: false

# 合并转发外显消息（合并消息显示在聊天列表中的标题）
forwardTitle: 'Lofter解析结果'

# 合并转发内部QQ名（合并消息内注明的发出者昵称），为空时使用默认Bot名称
forwardNickname: ''

# 请求的超时时间（单位：秒）
timeout: 30

# 是否在解析结果中显示文章的标签（Tags）
showTags: true

# 开启图片大小限制，超出限制的图片将会被拦截或替换
enableImageSizeLimit: true

# 图片大小限制的最大值（单位：MB）
imageSizeLimit: 8
